name: Daily Shorts

on:
  schedule:
    # Global audience: US + India + Europe prime windows. 4 slots, ~6h apart.
    # 14:00 UTC = 17:00 TR  -> India 7:30 PM (prime), US East 9 AM
    # 17:00 UTC = 20:00 TR  -> Europe evening, US East noon, US West 9 AM
    # 21:00 UTC = 00:00 TR  -> US East 4 PM, US West 1 PM (afternoon prime)
    # 02:00 UTC = 05:00 TR  -> US East 9 PM (peak), US West 6 PM (prime)
    - cron: "0 14 * * *"
    - cron: "0 17 * * *"
    - cron: "0 21 * * *"
    - cron: "0 2 * * *"
  workflow_dispatch:        # allows manual trigger from the Actions tab

concurrency:
  group: shorts
  cancel-in-progress: false

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # allows room for 1 pipeline retry on failure
    permissions:
      contents: write  # needed to push updated topic_history.json back to repo
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TTS_VOICE: en-US-ChristopherNeural
      TTS_RATE: "+0%"
      NICHE: history
      LANGUAGE: English
      TARGET_VIEWS: 1000000
      YOUTUBE_CLIENT_SECRET_PATH: client_secret.json
      YOUTUBE_TOKEN_PATH: token.json
      YOUTUBE_PRIVACY: public

    steps:
      - uses: actions/checkout@v4

      - name: Pick subtitle language for this slot
        # Turkey-prime cron slots get Turkish subtitles; others stay English.
        # Manual workflow_dispatch defaults to English unless SUBTITLE_LANG is
        # set in the environment by the caller.
        run: |
          case "${{ github.event.schedule }}" in
            "0 14 * * *"|"0 17 * * *")
              echo "SUBTITLE_LANG=tr" >> $GITHUB_ENV
              echo "[lang] Turkey-prime slot -> Turkish subtitles" ;;
            *)
              echo "SUBTITLE_LANG=en" >> $GITHUB_ENV
              echo "[lang] non-TR slot -> English subtitles" ;;
          esac

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install npm deps
        run: npm ci || npm install

      - name: Install Chrome for Remotion
        run: npx remotion browser ensure

      - name: Restore OAuth secrets to disk
        env:
          GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          printf '%s' "$GOOGLE_CLIENT_SECRET_JSON" > client_secret.json
          printf '%s' "$GOOGLE_TOKEN_JSON" > token.json
          python -c "import json; json.load(open('client_secret.json')); json.load(open('token.json')); print('secrets OK')"

      - name: Run pipeline (with 1 auto-retry on failure)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 2
          retry_wait_seconds: 30
          command: python main.py --urls-file urls.txt

      - name: Commit updated topic history + metadata
        if: success()
        run: |
          changed=0
          for f in pipeline/topic_history.json pipeline/topic_meta.json; do
            if [ -f "$f" ] && ! git diff --quiet "$f"; then
              git add "$f"
              changed=1
            fi
          done
          if [ "$changed" -eq 1 ]; then
            git config user.name "shorts-bot"
            git config user.email "shorts-bot@users.noreply.github.com"
            git commit -m "chore: append topic + metadata [skip ci]"
            for i in 1 2 3; do
              if git pull --rebase --autostash && git push; then
                echo "topic history pushed"
                break
              fi
              echo "push attempt $i failed, retrying..."
              sleep 5
            done
          else
            echo "no topic history change to commit"
          fi

      - name: Upload artifacts for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_id }}
          path: |
            workspace/*/short.mp4
            workspace/*/script.json
            workspace/*/title.json
            workspace/*/subtitles.json
            workspace/*/youtube_url.txt
          if-no-files-found: ignore
          retention-days: 7
