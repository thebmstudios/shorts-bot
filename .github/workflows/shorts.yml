name: Daily Shorts

on:
  schedule:
    # US-EASTERN-TIME 6-slot schedule (EDT / UTC-4; summer).
    # Each cron hits an algorithm-prime US Shorts swipe window.
    # Note: YouTube free-tier daily upload quota is ~6 — we are at the ceiling.
    #       GH cron is UTC; shifts +1h when DST ends in November.
    #
    # 10:30 UTC = 06:30 ET  -> East-coast morning commute swipe
    # 16:00 UTC = 12:00 ET  -> National lunch window
    # 19:30 UTC = 15:30 ET  -> US after-school + West-coast late lunch
    # 22:30 UTC = 18:30 ET  -> Early evening + dinner swipe
    # 01:00 UTC = 21:00 ET  -> HERO slot, peak US Shorts traffic
    # 03:00 UTC = 23:00 ET  -> Bedtime swipe + West-coast prime
    - cron: "30 10 * * *"
    - cron: "0 16 * * *"
    - cron: "30 19 * * *"
    - cron: "30 22 * * *"
    - cron: "0 1 * * *"
    - cron: "0 3 * * *"
  workflow_dispatch:        # allows manual trigger from the Actions tab
  repository_dispatch:
    # Triggered by external scheduler (cron-job.org). All slots English.
    types: [shorts-en]

concurrency:
  group: shorts
  cancel-in-progress: false

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # allows room for 1 pipeline retry on failure
    permissions:
      contents: write  # needed to push updated topic_history.json back to repo
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Optional: set HUGGINGFACE_API_KEY secret to enable AI image fallback
      # when Wikipedia returns too few topic-relevant images. Without it the
      # pipeline still runs (just uses Wikipedia only).
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
      TTS_VOICE: en-US-AndrewNeural
      TTS_RATE: "+0%"
      # Multi-language caption tracks. Audio stays English; viewers toggle CC.
      # Picked for highest non-US audience value: Latin America (es/pt),
      # France/Germany/Italy/Korea/Japan/India/Indonesia/Turkey.
      # Adds ~$5/month at 6 videos/day. Removing a language = ~$0.5/month off.
      CAPTION_LANGUAGES: "en,es,pt,fr,de,it,ko,ja,hi,id,tr"
      NICHE: history
      LANGUAGE: English
      TARGET_VIEWS: 1000000
      YOUTUBE_CLIENT_SECRET_PATH: client_secret.json
      YOUTUBE_TOKEN_PATH: token.json
      YOUTUBE_PRIVACY: public

    steps:
      - uses: actions/checkout@v4

      - name: Subtitle language
        # All slots use English subtitles. Kept as a step so we can vary later
        # without touching the rest of the workflow.
        run: |
          echo "SUBTITLE_LANG=en" >> $GITHUB_ENV
          echo "[lang] all slots -> English subtitles"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install npm deps
        run: npm ci || npm install

      - name: Install Chrome for Remotion
        run: npx remotion browser ensure

      - name: Restore OAuth secrets to disk
        env:
          GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          printf '%s' "$GOOGLE_CLIENT_SECRET_JSON" > client_secret.json
          printf '%s' "$GOOGLE_TOKEN_JSON" > token.json
          python -c "import json; json.load(open('client_secret.json')); json.load(open('token.json')); print('secrets OK')"

      - name: Pre-check YouTube OAuth token (fail fast if expired)
        # Catches "invalid_grant: Token has been expired or revoked" BEFORE the
        # ~15-minute pipeline runs. If this step fails, the only fix is to run
        # `python reauth.py` locally and update the GOOGLE_TOKEN_JSON secret.
        run: |
          python - <<'PY'
          import sys
          from google.auth.transport.requests import Request
          from google.oauth2.credentials import Credentials
          SCOPES = ["https://www.googleapis.com/auth/youtube.force-ssl"]
          try:
              creds = Credentials.from_authorized_user_file("token.json", SCOPES)
              if not creds.valid:
                  if creds.expired and creds.refresh_token:
                      creds.refresh(Request())
                  else:
                      raise RuntimeError("Token is not valid and has no refresh_token")
              print("[oauth-precheck] token OK — refresh works, pipeline can upload.")
          except Exception as e:
              print("=" * 70, flush=True)
              print("[oauth-precheck] FATAL: YouTube OAuth token is dead.", flush=True)
              print(f"[oauth-precheck] error: {e}", flush=True)
              print("=" * 70, flush=True)
              print("FIX (takes 2 minutes):", flush=True)
              print("  1. On your local machine:  cd C:\\Users\\murat\\Desktop\\yeni && python reauth.py", flush=True)
              print("  2. Browser opens → log in with the YouTube channel's Google account → Allow.", flush=True)
              print("  3. Copy the JSON block printed in the terminal.", flush=True)
              print("  4. https://github.com/thebmstudios/shorts-bot/settings/secrets/actions", flush=True)
              print("     → GOOGLE_TOKEN_JSON → Update → paste → Save.", flush=True)
              print("  5. Re-run this workflow.", flush=True)
              print("=" * 70, flush=True)
              sys.exit(1)
          PY

      - name: Run pipeline (with 1 auto-retry on failure)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 2
          retry_wait_seconds: 30
          command: python main.py --urls-file urls.txt

      - name: Commit updated topic history + metadata
        if: success()
        run: |
          changed=0
          for f in pipeline/topic_history.json pipeline/topic_meta.json; do
            if [ -f "$f" ] && ! git diff --quiet "$f"; then
              git add "$f"
              changed=1
            fi
          done
          if [ "$changed" -eq 1 ]; then
            git config user.name "shorts-bot"
            git config user.email "shorts-bot@users.noreply.github.com"
            git commit -m "chore: append topic + metadata [skip ci]"
            for i in 1 2 3; do
              if git pull --rebase --autostash && git push; then
                echo "topic history pushed"
                break
              fi
              echo "push attempt $i failed, retrying..."
              sleep 5
            done
          else
            echo "no topic history change to commit"
          fi

      - name: Upload artifacts for debugging
        if: always()
        continue-on-error: true  # quota hits here must not fail the whole run
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_id }}
          path: |
            workspace/*/script.json
            workspace/*/title.json
            workspace/*/subtitles.json
            workspace/*/youtube_url.txt
          if-no-files-found: ignore
          retention-days: 2
