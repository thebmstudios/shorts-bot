name: Daily Shorts

on:
  schedule:
    # US-EASTERN-TIME optimized schedule (currently EDT / UTC-4; summer).
    # Each cron is the algorithm-prime swipe window for US Shorts audience.
    # NOTE: GH cron is UTC; these will shift +1h when DST ends in November
    # (then they become 7:30 AM / 1 PM / 8 PM / 10:30 PM ET). Acceptable drift.
    #
    # 10:30 UTC = 06:30 ET (EDT)  -> US East-coast morning swipe
    # 16:00 UTC = 12:00 ET (EDT)  -> US national lunch window
    # 23:00 UTC = 19:00 ET (EDT)  -> US pre-prime ramp
    # 01:30 UTC = 21:30 ET (EDT)  -> HERO slot, peak US Shorts traffic
    - cron: "30 10 * * *"
    - cron: "0 16 * * *"
    - cron: "0 23 * * *"
    - cron: "30 1 * * *"
  workflow_dispatch:        # allows manual trigger from the Actions tab
  repository_dispatch:
    # Triggered by external scheduler (cron-job.org). All slots English.
    types: [shorts-en]

concurrency:
  group: shorts
  cancel-in-progress: false

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # allows room for 1 pipeline retry on failure
    permissions:
      contents: write  # needed to push updated topic_history.json back to repo
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TTS_VOICE: en-US-ChristopherNeural
      TTS_RATE: "+0%"
      NICHE: history
      LANGUAGE: English
      TARGET_VIEWS: 1000000
      YOUTUBE_CLIENT_SECRET_PATH: client_secret.json
      YOUTUBE_TOKEN_PATH: token.json
      YOUTUBE_PRIVACY: public

    steps:
      - uses: actions/checkout@v4

      - name: Subtitle language
        # All slots use English subtitles. Kept as a step so we can vary later
        # without touching the rest of the workflow.
        run: |
          echo "SUBTITLE_LANG=en" >> $GITHUB_ENV
          echo "[lang] all slots -> English subtitles"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install npm deps
        run: npm ci || npm install

      - name: Install Chrome for Remotion
        run: npx remotion browser ensure

      - name: Restore OAuth secrets to disk
        env:
          GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          printf '%s' "$GOOGLE_CLIENT_SECRET_JSON" > client_secret.json
          printf '%s' "$GOOGLE_TOKEN_JSON" > token.json
          python -c "import json; json.load(open('client_secret.json')); json.load(open('token.json')); print('secrets OK')"

      - name: Run pipeline (with 1 auto-retry on failure)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 2
          retry_wait_seconds: 30
          command: python main.py --urls-file urls.txt

      - name: Commit updated topic history + metadata
        if: success()
        run: |
          changed=0
          for f in pipeline/topic_history.json pipeline/topic_meta.json; do
            if [ -f "$f" ] && ! git diff --quiet "$f"; then
              git add "$f"
              changed=1
            fi
          done
          if [ "$changed" -eq 1 ]; then
            git config user.name "shorts-bot"
            git config user.email "shorts-bot@users.noreply.github.com"
            git commit -m "chore: append topic + metadata [skip ci]"
            for i in 1 2 3; do
              if git pull --rebase --autostash && git push; then
                echo "topic history pushed"
                break
              fi
              echo "push attempt $i failed, retrying..."
              sleep 5
            done
          else
            echo "no topic history change to commit"
          fi

      - name: Upload artifacts for debugging
        if: always()
        continue-on-error: true  # quota hits here must not fail the whole run
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_id }}
          path: |
            workspace/*/script.json
            workspace/*/title.json
            workspace/*/subtitles.json
            workspace/*/youtube_url.txt
          if-no-files-found: ignore
          retention-days: 2
